<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nova Chat</title>
<style>
  :root {
    --bg-deep: #05060f;
    --bg-panel: #0d0f1f;
    --bg-panel-2: #11142a;
    --accent: #7c9eff;
    --accent-2: #b07cff;
    --text-main: #e8eaf6;
    --text-dim: #8d93b0;
    --border: rgba(255,255,255,0.06);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    background: var(--bg-deep);
    color: var(--text-main);
    height:100vh; overflow:hidden;
    display:flex; align-items:center; justify-content:center;
    position:relative;
  }

  /* Starfield canvas */
  #stars { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; }

  /* ===== AUTH SCREEN ===== */
  #auth-screen {
    position:relative; z-index:1;
    background: rgba(13,15,31,0.75);
    backdrop-filter: blur(14px);
    border:1px solid var(--border);
    border-radius:20px; padding:44px; width:380px; text-align:center;
    box-shadow: 0 20px 60px rgba(0,0,0,.5);
  }
  #auth-screen h1 {
    font-size:30px; font-weight:700; letter-spacing:-0.5px;
    background:linear-gradient(135deg, var(--accent), var(--accent-2));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    margin-bottom:6px;
  }
  #auth-screen p { color:var(--text-dim); margin-bottom:26px; font-size:13px; }
  #auth-screen input {
    width:100%; padding:13px 14px; margin:7px 0; border:1px solid var(--border);
    border-radius:10px; font-size:14px; outline:none; background:rgba(255,255,255,0.03);
    color:var(--text-main); transition:.2s;
  }
  #auth-screen input::placeholder { color:var(--text-dim); }
  #auth-screen input:focus { border-color: var(--accent); background:rgba(124,158,255,0.06); }
  #auth-screen button {
    width:100%; padding:13px; margin-top:12px; border:none; border-radius:10px;
    font-weight:600; cursor:pointer; font-size:14px; transition:.2s;
  }
  #btn-login, #btn-register {
    background:linear-gradient(135deg, var(--accent), var(--accent-2)); color:#fff;
  }
  #btn-login:hover, #btn-register:hover { opacity:.9; transform:translateY(-1px); }
  #auth-screen .or { margin:16px 0; color:var(--text-dim); font-size:11px; letter-spacing:1px; text-transform:uppercase; }
  .anon-btn { background:transparent; color:var(--accent); border:1px solid var(--border) !important; }
  .anon-btn:hover { background:rgba(124,158,255,0.08); }
  #auth-screen .error { color:#ff6b6b; font-size:12px; margin-top:10px; min-height:16px; }

  /* ===== APP LAYOUT ===== */
  #app {
    position:relative; z-index:1;
    display:none; width:920px; height:88vh; max-height:720px;
    background: rgba(13,15,31,0.7);
    backdrop-filter: blur(16px);
    border:1px solid var(--border);
    border-radius:20px; overflow:hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,.5);
  }
  #app.active { display:flex; }

  /* Sidebar */
  #sidebar { width:320px; border-right:1px solid var(--border); display:flex; flex-direction:column; }
  #sidebar-header {
    padding:18px; display:flex; align-items:center; justify-content:space-between;
    border-bottom:1px solid var(--border);
  }
  #sidebar-header .user-info { display:flex; align-items:center; gap:12px; cursor:pointer; }
  .avatar-circle {
    width:40px; height:40px; border-radius:50%;
    background:linear-gradient(135deg, var(--accent), var(--accent-2));
    display:flex; align-items:center; justify-content:center; font-weight:700; color:#fff;
    flex-shrink:0; font-size:15px;
  }
  #sidebar-header .name { font-weight:600; font-size:14px; }
  #sidebar-header .sub { font-size:11px; color:var(--text-dim); }
  #sidebar-header button {
    background:rgba(255,255,255,.05); border:1px solid var(--border); color:var(--text-main);
    padding:7px 12px; border-radius:8px; cursor:pointer; font-size:12px; transition:.2s;
  }
  #sidebar-header button:hover { background:rgba(255,255,255,.1); }

  #new-chat-bar { padding:12px 16px; border-bottom:1px solid var(--border); display:flex; gap:8px; }
  #new-chat-bar input {
    flex:1; padding:10px 12px; border:1px solid var(--border); border-radius:10px; font-size:13px;
    outline:none; background:rgba(255,255,255,0.03); color:var(--text-main);
  }
  #new-chat-bar input:focus { border-color:var(--accent); }
  #new-chat-bar button {
    padding:10px 16px; background:linear-gradient(135deg, var(--accent), var(--accent-2));
    color:#fff; border:none; border-radius:10px; cursor:pointer; font-size:13px; font-weight:600;
  }

  #chat-list { flex:1; overflow-y:auto; }
  .chat-item {
    padding:14px 16px; display:flex; align-items:center; gap:12px; cursor:pointer;
    border-bottom:1px solid var(--border); transition:.15s;
  }
  .chat-item:hover { background:rgba(255,255,255,0.03); }
  .chat-item.active { background:rgba(124,158,255,0.1); }
  .chat-item .info { flex:1; overflow:hidden; }
  .chat-item .name { font-weight:600; font-size:14px; }
  .chat-item .last-msg { font-size:12px; color:var(--text-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  /* Chat window */
  #chat-window { flex:1; display:flex; flex-direction:column; }
  #chat-window-header {
    padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px;
  }
  #chat-window-header .name { font-weight:600; font-size:15px; }

  #messages { flex:1; overflow-y:auto; padding:24px; display:flex; flex-direction:column; gap:10px; }
  .msg {
    max-width:58%; padding:11px 15px; border-radius:16px; font-size:14px; line-height:1.45;
    word-wrap:break-word;
  }
  .msg.sent {
    align-self:flex-end;
    background:linear-gradient(135deg, var(--accent), var(--accent-2));
    color:#fff; border-bottom-right-radius:4px;
  }
  .msg.received {
    align-self:flex-start; background:rgba(255,255,255,0.05);
    border:1px solid var(--border); border-bottom-left-radius:4px;
  }
  .msg .time { font-size:10px; opacity:.65; margin-top:5px; display:block; text-align:right; }

  #message-input-bar { padding:16px 20px; border-top:1px solid var(--border); display:flex; gap:10px; }
  #message-input-bar input {
    flex:1; padding:13px 18px; border:1px solid var(--border); border-radius:24px; font-size:14px;
    outline:none; background:rgba(255,255,255,0.03); color:var(--text-main);
  }
  #message-input-bar input:focus { border-color:var(--accent); }
  #message-input-bar button {
    width:46px; height:46px; border-radius:50%;
    background:linear-gradient(135deg, var(--accent), var(--accent-2)); color:#fff;
    border:none; cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center;
    flex-shrink:0; transition:.2s;
  }
  #message-input-bar button:hover { transform:scale(1.05); }

  #empty-state {
    flex:1; display:flex; align-items:center; justify-content:center; flex-direction:column;
    color:var(--text-dim); gap:8px; text-align:center; padding:0 40px;
  }
  #empty-state h2 { color:var(--text-main); font-weight:600; font-size:18px; }
  #empty-state p { font-size:13px; }

  /* Profile overlay */
  #profile-overlay {
    position:absolute; inset:0; z-index:5; display:none;
    background:rgba(5,6,15,0.6); backdrop-filter:blur(6px);
    align-items:center; justify-content:center;
  }
  #profile-overlay.active { display:flex; }
  #profile-card {
    background: var(--bg-panel-2); border:1px solid var(--border); border-radius:18px;
    padding:32px; width:340px; text-align:center; position:relative;
    box-shadow:0 20px 50px rgba(0,0,0,.6);
  }
  #profile-card .avatar-circle { width:80px; height:80px; font-size:30px; margin:0 auto 16px; }
  #profile-card h2 { font-size:18px; margin-bottom:4px; }
  #profile-card .field {
    margin-top:18px; text-align:left; background:rgba(255,255,255,0.03);
    border:1px solid var(--border); border-radius:10px; padding:12px 14px;
  }
  #profile-card .field label { font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; }
  #profile-card .field .val { font-size:14px; margin-top:4px; word-break:break-all; font-family:monospace; }
  #profile-card .copy-btn {
    margin-top:6px; font-size:11px; color:var(--accent); cursor:pointer; background:none; border:none; padding:0;
  }
  #close-profile {
    position:absolute; top:14px; right:16px; background:none; border:none; color:var(--text-dim);
    font-size:20px; cursor:pointer;
  }

  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:3px; }
</style>
</head>
<body>

<canvas id="stars"></canvas>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <h1>Nova Chat</h1>
  <p>Ngobrol real-time di antara bintang ✨</p>

  <input type="text" id="display-name" placeholder="Nama tampilan (untuk daftar)" />
  <input type="email" id="email" placeholder="Email" />
  <input type="password" id="password" placeholder="Password" />

  <button id="btn-login">Masuk</button>
  <button id="btn-register">Daftar Baru</button>

  <div class="or">atau</div>
  <button class="anon-btn" id="btn-anon">Masuk sebagai Tamu</button>

  <div class="error" id="auth-error"></div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">
      <div class="user-info" id="open-profile">
        <div class="avatar-circle" id="my-avatar">?</div>
        <div>
          <div class="name" id="my-name">User</div>
          <div class="sub">Lihat profil</div>
        </div>
      </div>
      <button id="btn-logout">Keluar</button>
    </div>
    <div id="new-chat-bar">
      <input type="text" id="contact-uid" placeholder="Masukkan UID kontak..." />
      <button id="btn-add-chat">Chat</button>
    </div>
    <div id="chat-list"></div>
  </div>

  <div id="chat-window">
    <div id="empty-state">
      <h2>Pilih chat atau mulai chat baru</h2>
      <p>Buka profilmu untuk menyalin UID, lalu bagikan ke teman supaya bisa mulai chat.</p>
    </div>
  </div>

  <!-- Profile overlay -->
  <div id="profile-overlay">
    <div id="profile-card">
      <button id="close-profile">&times;</button>
      <div class="avatar-circle" id="profile-avatar">?</div>
      <h2 id="profile-name">User</h2>
      <div style="font-size:12px; color:var(--text-dim);" id="profile-email"></div>
      <div class="field">
        <label>UID Kamu</label>
        <div class="val" id="profile-uid">-</div>
        <button class="copy-btn" id="copy-uid">Salin UID</button>
      </div>
    </div>
  </div>
</div>

<!-- Starfield script -->
<script>
(function() {
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  let stars = [];
  const STAR_COUNT = 80;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  for (let i = 0; i < STAR_COUNT; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.4 + 0.3,
      baseAlpha: Math.random() * 0.5 + 0.3,
      twinkleSpeed: Math.random() * 0.02 + 0.005,
      twinklePhase: Math.random() * Math.PI * 2,
      driftX: (Math.random() - 0.5) * 0.05,
      driftY: (Math.random() - 0.5) * 0.05
    });
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (const s of stars) {
      s.twinklePhase += s.twinkleSpeed;
      const alpha = s.baseAlpha + Math.sin(s.twinklePhase) * 0.3;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${Math.max(0, Math.min(1, alpha))})`;
      ctx.fill();

      s.x += s.driftX;
      s.y += s.driftY;
      if (s.x < 0) s.x = canvas.width;
      if (s.x > canvas.width) s.x = 0;
      if (s.y < 0) s.y = canvas.height;
      if (s.y > canvas.height) s.y = 0;
    }
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
  signInAnonymously, onAuthStateChanged, signOut, updateProfile
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  getFirestore, doc, setDoc, getDoc, collection, query, where,
  onSnapshot, addDoc, serverTimestamp, orderBy, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD-JcOtm22fzVE6vVv9vq0EKXxqU48ZoCY",
  authDomain: "chatapp-4f9d0.firebaseapp.com",
  projectId: "chatapp-4f9d0",
  storageBucket: "chatapp-4f9d0.firebasestorage.app",
  messagingSenderId: "337831239447",
  appId: "1:337831239447:web:d484fcbcb74383b8152152"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let activeChatId = null;
let unsubMessages = null;
let unsubChats = null;

// ===== AUTH HANDLERS =====
document.getElementById("btn-register").onclick = async () => {
  const name = document.getElementById("display-name").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const errEl = document.getElementById("auth-error");
  errEl.textContent = "";
  if (!name || !email || !password) { errEl.textContent = "Lengkapi semua field."; return; }
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, password);
    await updateProfile(cred.user, { displayName: name });
    await setDoc(doc(db, "users", cred.user.uid), {
      name, email, uid: cred.user.uid, createdAt: serverTimestamp()
    });
  } catch (e) { errEl.textContent = e.message; }
};

document.getElementById("btn-login").onclick = async () => {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const errEl = document.getElementById("auth-error");
  errEl.textContent = "";
  try {
    await signInWithEmailAndPassword(auth, email, password);
  } catch (e) { errEl.textContent = e.message; }
};

document.getElementById("btn-anon").onclick = async () => {
  const errEl = document.getElementById("auth-error");
  errEl.textContent = "";
  try {
    const cred = await signInAnonymously(auth);
    const name = "Tamu-" + cred.user.uid.slice(0, 5);
    await updateProfile(cred.user, { displayName: name });
    await setDoc(doc(db, "users", cred.user.uid), {
      name, uid: cred.user.uid, createdAt: serverTimestamp()
    }, { merge: true });
  } catch (e) { errEl.textContent = e.message; }
};

document.getElementById("btn-logout").onclick = () => signOut(auth);

// ===== PROFILE OVERLAY =====
document.getElementById("open-profile").onclick = () => {
  if (!currentUser) return;
  const name = currentUser.displayName || "User";
  document.getElementById("profile-avatar").textContent = name.charAt(0).toUpperCase();
  document.getElementById("profile-name").textContent = name;
  document.getElementById("profile-email").textContent = currentUser.email || "Akun tamu";
  document.getElementById("profile-uid").textContent = currentUser.uid;
  document.getElementById("profile-overlay").classList.add("active");
};
document.getElementById("close-profile").onclick = () => {
  document.getElementById("profile-overlay").classList.remove("active");
};
document.getElementById("copy-uid").onclick = () => {
  navigator.clipboard.writeText(currentUser.uid);
  const btn = document.getElementById("copy-uid");
  const original = btn.textContent;
  btn.textContent = "Tersalin!";
  setTimeout(() => btn.textContent = original, 1500);
};

// ===== AUTH STATE =====
onAuthStateChanged(auth, (user) => {
  if (user) {
    currentUser = user;
    document.getElementById("auth-screen").style.display = "none";
    document.getElementById("app").classList.add("active");

    const name = user.displayName || "User";
    document.getElementById("my-name").textContent = name;
    document.getElementById("my-avatar").textContent = name.charAt(0).toUpperCase();

    loadChats();
  } else {
    currentUser = null;
    document.getElementById("auth-screen").style.display = "block";
    document.getElementById("app").classList.remove("active");
    document.getElementById("profile-overlay").classList.remove("active");
    if (unsubMessages) unsubMessages();
    if (unsubChats) unsubChats();
  }
});

// ===== START / OPEN NEW CHAT =====
document.getElementById("btn-add-chat").onclick = async () => {
  const otherUid = document.getElementById("contact-uid").value.trim();
  if (!otherUid || otherUid === currentUser.uid) return;

  const otherDoc = await getDoc(doc(db, "users", otherUid));
  if (!otherDoc.exists()) { alert("User dengan UID tersebut tidak ditemukan."); return; }

  const chatId = [currentUser.uid, otherUid].sort().join("_");
  const chatRef = doc(db, "chats", chatId);
  const chatDoc = await getDoc(chatRef);
  if (!chatDoc.exists()) {
    await setDoc(chatRef, {
      participants: [currentUser.uid, otherUid],
      participantNames: {
        [currentUser.uid]: currentUser.displayName || "User",
        [otherUid]: otherDoc.data().name || "User"
      },
      lastMessage: "",
      updatedAt: serverTimestamp()
    });
  }
  openChat(chatId);
  document.getElementById("contact-uid").value = "";
};

// ===== LOAD CHAT LIST =====
function loadChats() {
  const q = query(collection(db, "chats"), where("participants", "array-contains", currentUser.uid));
  unsubChats = onSnapshot(q, (snap) => {
    const listEl = document.getElementById("chat-list");
    listEl.innerHTML = "";
    snap.forEach((docSnap) => {
      const data = docSnap.data();
      const otherUid = data.participants.find(p => p !== currentUser.uid);
      const otherName = (data.participantNames && data.participantNames[otherUid]) || "User";

      const item = document.createElement("div");
      item.className = "chat-item" + (docSnap.id === activeChatId ? " active" : "");
      item.innerHTML = `
        <div class="avatar-circle">${otherName.charAt(0).toUpperCase()}</div>
        <div class="info">
          <div class="name">${otherName}</div>
          <div class="last-msg">${data.lastMessage || "Mulai mengobrol..."}</div>
        </div>
      `;
      item.onclick = () => openChat(docSnap.id);
      listEl.appendChild(item);
    });
  });
}

// ===== OPEN CHAT =====
function openChat(chatId) {
  activeChatId = chatId;
  document.querySelectorAll(".chat-item").forEach(el => el.classList.remove("active"));

  const chatWindow = document.getElementById("chat-window");
  chatWindow.innerHTML = `
    <div id="chat-window-header">
      <div class="avatar-circle" id="chat-avatar">?</div>
      <div class="name" id="chat-name">Loading...</div>
    </div>
    <div id="messages"></div>
    <div id="message-input-bar">
      <input type="text" id="msg-input" placeholder="Tulis pesan..." />
      <button id="btn-send">&#10148;</button>
    </div>
  `;

  getDoc(doc(db, "chats", chatId)).then((chatDoc) => {
    const data = chatDoc.data();
    const otherUid = data.participants.find(p => p !== currentUser.uid);
    const otherName = (data.participantNames && data.participantNames[otherUid]) || "User";
    document.getElementById("chat-name").textContent = otherName;
    document.getElementById("chat-avatar").textContent = otherName.charAt(0).toUpperCase();
  });

  if (unsubMessages) unsubMessages();
  const msgQuery = query(collection(db, "chats", chatId, "messages"), orderBy("timestamp", "asc"));
  unsubMessages = onSnapshot(msgQuery, (snap) => {
    const msgEl = document.getElementById("messages");
    if (!msgEl) return;
    msgEl.innerHTML = "";
    snap.forEach((docSnap) => {
      const m = docSnap.data();
      const isSent = m.senderId === currentUser.uid;
      const time = m.timestamp ? new Date(m.timestamp.toDate()).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }) : "";
      const div = document.createElement("div");
      div.className = "msg " + (isSent ? "sent" : "received");
      div.innerHTML = `${escapeHtml(m.text)}<span class="time">${time}</span>`;
      msgEl.appendChild(div);
    });
    msgEl.scrollTop = msgEl.scrollHeight;
  });

  const input = document.getElementById("msg-input");
  const sendBtn = document.getElementById("btn-send");
  const send = () => sendMessage(chatId, input);
  sendBtn.onclick = send;
  input.onkeydown = (e) => { if (e.key === "Enter") send(); };
}

// ===== SEND MESSAGE =====
async function sendMessage(chatId, input) {
  const text = input.value.trim();
  if (!text) return;
  input.value = "";

  await addDoc(collection(db, "chats", chatId, "messages"), {
    senderId: currentUser.uid,
    text,
    timestamp: serverTimestamp()
  });

  await updateDoc(doc(db, "chats", chatId), {
    lastMessage: text,
    updatedAt: serverTimestamp()
  });
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}
</script>
</body>
</html>
